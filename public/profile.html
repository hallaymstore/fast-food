<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil | Kardeshler Doner</title>
    <link rel="stylesheet" href="/foodwagon-v1.0.0/public/assets/css/theme.min.css" />
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body class="kd-layout" data-page="profile" data-require-auth="true">
    <nav class="navbar navbar-expand-lg fixed-top kd-navbar">
      <div class="container">
        <a class="navbar-brand kd-brand" href="/index.html">Kardeshler Doner<small>Premium Fast-Food Experience</small></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#kdNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="kdNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/index.html">Bosh sahifa</a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/menu.html">Menu</a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/order.html">Buyurtma <span class="badge bg-danger cart-count d-none"></span></a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/payment.html">To'lov</a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/dashboard.html">Kabinet</a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/history.html">Tarix</a></li>
            <li class="nav-item"><a class="nav-link kd-nav-link" href="/profile.html">Profil</a></li>
            <li class="nav-item"><button class="kd-theme-toggle" id="themeToggle" type="button"><i class="fas fa-moon"></i></button></li>
            <li class="nav-item"><div id="authArea"></div></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-3 py-md-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <section class="kd-panel p-3 p-md-4">
            <div class="kd-section-title mb-3">
              <h2>Profil Sozlamalari</h2>
              <span class="kd-pill" id="profileRole">-</span>
            </div>

            <form id="profileForm" class="d-grid gap-2">
              <label>
                Ism familiya
                <input id="profileName" class="form-control" required />
              </label>
              <label>
                Telefon
                <input id="profilePhone" class="form-control" disabled />
              </label>
              <label>
                Email
                <input id="profileEmail" class="form-control" type="email" />
              </label>
              <label>
                Manzil
                <textarea id="profileAddress" class="form-control" rows="3"></textarea>
              </label>

              <hr />
              <h5>Parolni yangilash</h5>
              <label>
                Joriy parol
                <input id="currentPassword" type="password" class="form-control" />
              </label>
              <label>
                Yangi parol
                <input id="newPassword" type="password" class="form-control" />
              </label>

              <button class="kd-btn-primary" type="submit">Saqlash</button>
            </form>
          </section>
        </div>
      </div>
    </main>

    <footer class="container py-3 kd-footer"><span>Kardeshler Doner Profile</span></footer>

    <script src="/foodwagon-v1.0.0/public/vendors/@popperjs/popper.min.js"></script>
    <script src="/foodwagon-v1.0.0/public/vendors/bootstrap/bootstrap.min.js"></script>
    <script src="/foodwagon-v1.0.0/public/vendors/fontawesome/all.min.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/profile.js"></script>
  </body>
</html>
